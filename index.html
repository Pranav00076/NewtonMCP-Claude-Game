<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Shooter AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Courier New',monospace;overflow:hidden;color:#fff;user-select:none;}

#menu{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 60%,#0d1a3a,#060610);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
#menu h1{font-size:3.5em;color:#0ff;text-shadow:0 0 30px #0ff,0 0 60px #0ff4;margin-bottom:6px;letter-spacing:.1em;}
#menu .sub{color:#446;font-size:.9em;margin-bottom:28px;letter-spacing:.2em;}
.section{margin:10px 0;text-align:center;}
.section-label{color:#446;font-size:.72em;letter-spacing:.2em;margin-bottom:8px;text-transform:uppercase;}
.btn{background:transparent;border:1px solid #0ff3;color:#0ff9;padding:11px 28px;margin:5px;cursor:pointer;font-size:.92em;font-family:inherit;border-radius:3px;transition:all .18s;min-width:190px;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#0ff0,#0ff1);transition:.18s;}
.btn:hover::before{background:linear-gradient(135deg,#0ff2,#0ff1);}
.btn:hover{border-color:#0ff8;box-shadow:0 0 16px #0ff4;color:#fff;}
.btn.active{border-color:#0ff;background:linear-gradient(135deg,#0ff2,#0ff1);box-shadow:0 0 24px #0ff6;color:#fff;}
.env-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;}
.start-btn{font-size:1.15em;padding:14px 48px;border-color:#0ff;background:linear-gradient(135deg,#0ff3,#0ff1);box-shadow:0 0 30px #0ff5;margin-top:18px;min-width:220px;letter-spacing:.1em;}
.gesture-legend{color:#334;font-size:.75em;margin-top:14px;line-height:1.8;}
.gesture-legend span{color:#0ff8;}

#game{display:none;position:fixed;inset:0;}
canvas{display:block;}

#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;z-index:10;}
#score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 24px 8px;background:linear-gradient(#000a,transparent);}
.sbox{text-align:center;}
.sbox .sname{font-size:.68em;letter-spacing:.15em;opacity:.7;}
.sbox .sval{font-size:2.2em;font-weight:bold;line-height:1;}
#center-hud{text-align:center;}
#env-name{font-size:.7em;letter-spacing:.15em;color:#ff09;margin-bottom:2px;}
#wave-tag{font-size:.75em;color:#f809;}

#wave-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.2em;font-weight:bold;color:#ff0;text-shadow:0 0 40px #ff0;pointer-events:none;z-index:20;opacity:0;transition:opacity .4s;text-align:center;white-space:nowrap;}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0009;border:1px solid #0ff2;padding:6px 18px;border-radius:20px;font-size:.72em;color:#0ff9;pointer-events:none;z-index:10;white-space:nowrap;}
#cam-pill{position:fixed;top:68px;left:50%;transform:translateX(-50%);padding:4px 14px;border-radius:20px;font-size:.68em;pointer-events:none;z-index:10;transition:opacity 1s;opacity:0;}
</style>
</head>
<body>

<div id="menu">
  <h1>HAND SHOOTER</h1>
  <div class="sub">AR · WAVE SURVIVAL · GESTURE CONTROL</div>

  <div class="section">
    <div class="section-label">Mode</div>
    <button class="btn active" id="btn-1p" onclick="setMode(1)">👤 Solo — Both Hands</button>
    <button class="btn" id="btn-2p" onclick="setMode(2)">👥 2 Player Co-op</button>
  </div>

  <div class="section">
    <div class="section-label">Environment</div>
    <div class="env-grid">
      <button class="btn active" onclick="setEnv(0,this)">🏙️ City</button>
      <button class="btn" onclick="setEnv(1,this)">🌋 Volcano</button>
      <button class="btn" onclick="setEnv(2,this)">🚀 Space</button>
      <button class="btn" onclick="setEnv(3,this)">🏯 Feudal</button>
      <button class="btn" onclick="setEnv(4,this)">🌊 Ocean</button>
    </div>
  </div>

  <div class="gesture-legend">
    <span>☝️</span> Pistol &nbsp;&nbsp;<span>✌️</span> SMG &nbsp;&nbsp;<span>🖐️</span> Shotgun &nbsp;&nbsp;<span>👊</span> Grenade &nbsp;&nbsp;<span>🤙</span> Sniper
    <br>Pinch thumb + index to <span>SHOOT</span> &nbsp;|&nbsp; Mouse: click to shoot, SPACE = cycle gun
  </div>

  <button class="btn start-btn" onclick="startGame()">▶ START</button>
</div>

<div id="game">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="score-bar">
      <div class="sbox">
        <div class="sname" id="p1name" style="color:#0ff">P1</div>
        <div class="sval" id="s1" style="color:#0ff">0</div>
      </div>
      <div id="center-hud">
        <div id="env-name"></div>
        <div id="wave-tag"></div>
      </div>
      <div class="sbox" id="p2box" style="display:none">
        <div class="sname" style="color:#f4a">P2</div>
        <div class="sval" id="s2" style="color:#f4a">0</div>
      </div>
    </div>
  </div>
  <div id="wave-banner"></div>
  <div id="hint"></div>
  <div id="cam-pill"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
let numPlayers=1, envIdx=0;

const ENVS=[
  {name:'🏙️ CITY',   sky:['#04040f','#0a0a20'], fog:'#0004', ground:'#141414', accent:'#0ff', accentDim:'#0ff2'},
  {name:'🌋 VOLCANO', sky:['#180404','#300808'], fog:'#f8040010', ground:'#1a0800', accent:'#f84', accentDim:'#f842'},
  {name:'🚀 SPACE',   sky:['#000005','#00000d'], fog:'#0000', ground:'#050505', accent:'#c4ff', accentDim:'#c4ff2'},
  {name:'🏯 FEUDAL',  sky:['#0d0d04','#1a1a08'], fog:'#8840', ground:'#120d00', accent:'#fd8', accentDim:'#fd82'},
  {name:'🌊 OCEAN',   sky:['#000818','#001030'], fog:'#0af1', ground:'#000d18', accent:'#0af', accentDim:'#0af2'},
];

const GUNS=[
  {name:'Pistol',  emoji:'☝️', color:'#0ff', dmg:30,  rate:420,  spread:.028, blt:1, aoe:0,   spd:18},
  {name:'SMG',     emoji:'✌️', color:'#3f6', dmg:12,  rate:90,   spread:.13,  blt:1, aoe:0,   spd:20},
  {name:'Shotgun', emoji:'🖐️', color:'#f80', dmg:22,  rate:650,  spread:.38,  blt:7, aoe:0,   spd:16},
  {name:'Grenade', emoji:'👊', color:'#f33', dmg:90,  rate:1300, spread:.04,  blt:1, aoe:95,  spd:12},
  {name:'Sniper',  emoji:'🤙', color:'#f4f', dmg:250, rate:1600, spread:.005, blt:1, aoe:0,   spd:28},
];

const ETYPES=[
  {n:'Grunt',     hp:60,   spd:48,  sz:24, col:'#f44', pts:10,  em:'👾'},
  {n:'Runner',    hp:35,   spd:140, sz:18, col:'#fa0', pts:20,  em:'🏃'},
  {n:'Tank',      hp:280,  spd:26,  sz:42, col:'#a4f', pts:35,  em:'🤖'},
  {n:'Mini-Boss', hp:700,  spd:35,  sz:55, col:'#f4f', pts:120, em:'👹', boss:true},
  {n:'BOSS',      hp:2200, spd:16,  sz:80, col:'#f00', pts:600, em:'💀', boss:true},
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let canvas,ctx,W,H;
let cursors=[], enemies=[], bullets=[], particles=[];
let wave=1, waveTimer=0, waveGap=3200, gameRunning=false;
let scores=[0,0], lastTime=0;
let usingCamera=false;
let bgCache=null, bgCacheEnv=-1;
let stars=[], frameCount=0;

// Smooth tracking state per cursor
// rawPos = raw input, smoothPos = exponentially smoothed, vel = velocity for prediction
const SMOOTH_ALPHA = 0.22;   // lower = smoother, higher = more responsive
const SMOOTH_VEL   = 0.15;   // velocity blending for predictive smoothing
const PINCH_THRESH_CLOSE = 0.055;
const PINCH_THRESH_OPEN  = 0.075; // hysteresis

// ═══════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════
function setMode(n){
  numPlayers=n;
  document.getElementById('btn-1p').classList.toggle('active',n===1);
  document.getElementById('btn-2p').classList.toggle('active',n===2);
}
function setEnv(i,el){
  envIdx=i;
  document.querySelectorAll('.env-grid .btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function startGame(){
  document.getElementById('menu').style.display='none';
  initGame();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function initGame(){
  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  resize(); window.addEventListener('resize',()=>{resize();bgCache=null;});

  document.getElementById('game').style.display='block';
  document.getElementById('env-name').textContent=ENVS[envIdx].name;

  for(let i=0;i<200;i++) stars.push({x:Math.random()*4000,y:Math.random()*2000,b:Math.random()});

  const P1C='#0ff', P2C='#f4a';
  if(numPlayers===1){
    cursors.push(makeCursor(0,0,W*.35,H*.7,P1C,'L'));
    cursors.push(makeCursor(1,0,W*.65,H*.7,P1C,'R'));
  } else {
    cursors.push(makeCursor(0,0,W*.3,H*.7,P1C,'P1'));
    cursors.push(makeCursor(1,1,W*.7,H*.7,P2C,'P2'));
    document.getElementById('p2box').style.display='block';
  }

  setupControls();
  tryCamera();

  document.getElementById('hint').textContent = numPlayers===1
    ? '🖱 Mouse=left hand · Click=shoot · SPACE=gun · WASD/↑↓←→=right hand · Enter=shoot'
    : '🖱 Mouse=P1 · Click=P1 shoot · SPACE=P1 gun · WASD=P2 move · Q=P2 shoot · E=P2 gun';

  gameRunning=true;
  spawnWave(wave);
  requestAnimationFrame(loop);
}

function makeCursor(id,owner,x,y,color,label){
  return {
    id,owner,color,label,
    gunIdx:0,lastShot:0,
    rawPos:{x,y},
    smoothPos:{x,y},
    prevSmooth:{x,y},
    vel:{x:0,y:0},
    isPinching:false,
    pinchRaw:false,   // raw state
    pinchFrames:0,    // debounce counter
    trailPoints:[],   // for motion trail
    muzzleFlash:0,    // frames remaining
  };
}

function resize(){
  if(!canvas)return;
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}

// ═══════════════════════════════════════════════════════
// SMOOTHING
// ═══════════════════════════════════════════════════════
function smoothCursor(c){
  // Exponential moving average + velocity prediction
  const prev=c.smoothPos;
  const raw=c.rawPos;

  // EMA
  const sx=prev.x+(raw.x-prev.x)*SMOOTH_ALPHA;
  const sy=prev.y+(raw.y-prev.y)*SMOOTH_ALPHA;

  // Velocity (for prediction / trails)
  c.vel.x=c.vel.x*(1-SMOOTH_VEL)+(sx-prev.x)*SMOOTH_VEL;
  c.vel.y=c.vel.y*(1-SMOOTH_VEL)+(sy-prev.y)*SMOOTH_VEL;

  c.prevSmooth={...c.smoothPos};
  c.smoothPos={x:sx,y:sy};

  // Trail
  c.trailPoints.push({x:sx,y:sy});
  if(c.trailPoints.length>14) c.trailPoints.shift();

  // Pinch debounce (hysteresis: need 3 frames to confirm)
  if(c.pinchRaw){
    c.pinchFrames=Math.min(c.pinchFrames+1,5);
  } else {
    c.pinchFrames=Math.max(c.pinchFrames-2,0);
  }
  c.isPinching=c.pinchFrames>=3;
}

// ═══════════════════════════════════════════════════════
// CAMERA + MEDIAPIPE
// ═══════════════════════════════════════════════════════
async function tryCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    loadMediaPipe(stream);
  }catch(e){showPill('📵 No camera — mouse mode','#f88');}
}

function showPill(msg,col='#0f8'){
  const el=document.getElementById('cam-pill');
  el.textContent=msg; el.style.color=col;
  el.style.background=col+'22'; el.style.border=`1px solid ${col}55`;
  el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',3500);
}

function loadMediaPipe(stream){
  showPill('📷 Loading hand tracking…','#ff8');
  let n=0;
  ['https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js',
   'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js'].forEach(src=>{
    const s=document.createElement('script');
    s.src=src; s.crossOrigin='anonymous';
    s.onload=()=>{ if(++n===2) initMP(stream); };
    s.onerror=()=>showPill('⚠️ Hand tracking unavailable','#f88');
    document.head.appendChild(s);
  });
  setTimeout(()=>{if(!usingCamera)showPill('⚠️ Hand tracking timed out','#f88');},10000);
}

function initMP(stream){
  if(typeof Hands==='undefined')return;

  function setup(videoStream, cursorIdxA, cursorIdxB, maxHands){
    const video=document.createElement('video');
    Object.assign(video.style,{position:'fixed',opacity:'0',pointerEvents:'none',top:'0',left:'0',width:'1px',height:'1px'});
    video.autoplay=true; video.playsInline=true; video.muted=true;
    video.srcObject=videoStream;
    document.body.appendChild(video);

    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:maxHands,modelComplexity:1,minDetectionConfidence:0.75,minTrackingConfidence:0.6});
    hands.onResults(r=>onHandResults(r,cursorIdxA,cursorIdxB,maxHands>1));

    if(typeof Camera!=='undefined'){
      new Camera(video,{
        onFrame:async()=>{try{await hands.send({image:video});}catch(e){}},
        width:640,height:480,
      }).start().then(()=>{
        usingCamera=true;
        showPill('✅ Hand tracking active','#0f8');
        document.getElementById('hint').textContent=numPlayers===1
          ?'✋ Both hands tracked · Pinch to shoot · Change finger pose = switch gun'
          :'✋ Each player: pinch to shoot · Pose = switch gun';
      }).catch(()=>showPill('⚠️ Camera failed','#f88'));
    }
  }

  if(numPlayers===1){
    setup(stream,0,1,2);
  } else {
    setup(stream,0,-1,1);
    navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}})
      .then(s2=>setup(s2,1,-1,1))
      .catch(()=>showPill('⚠️ P2 camera failed — use WASD','#f88'));
  }
}

function onHandResults(res,idxA,idxB,bothHands){
  if(!res.multiHandLandmarks?.length) return;

  if(bothHands){
    // Sort hands: MediaPipe labels them — use handedness to assign left/right cursor
    const sorted=[...res.multiHandLandmarks].sort((a,b)=>a[9].x-b[9].x); // left=lower x after mirror
    sorted.forEach((lm,i)=>{
      const c=cursors[i]; if(!c)return;
      applyLM(c,lm);
    });
  } else {
    const c=cursors[idxA]; if(!c)return;
    applyLM(c,res.multiHandLandmarks[0]);
  }
}

function applyLM(c,lm){
  // Mirror X (selfie view)
  c.rawPos.x=(1-lm[9].x)*W;
  c.rawPos.y=lm[9].y*H;

  // Gesture recognition
  const up=(t,p)=>lm[t].y<lm[p].y;
  const idx=up(8,6),mid=up(12,10),ring=up(16,14),pinky=up(20,18);
  const thumbOut=lm[4].x<lm[3].x;

  let g=0;
  if(idx&&!mid&&!ring&&!pinky)         g=0; // pistol
  else if(idx&&mid&&!ring&&!pinky)     g=1; // smg
  else if(idx&&mid&&ring&&pinky)       g=2; // shotgun
  else if(!idx&&!mid&&!ring&&!pinky)   g=3; // grenade
  else if(pinky&&!idx&&!mid&&!ring&&thumbOut) g=4; // sniper shaka
  c.gunIdx=g;

  // Pinch: distance between thumb tip and index tip (normalised)
  const d=Math.hypot(lm[4].x-lm[8].x,lm[4].y-lm[8].y);
  c.pinchRaw=d<PINCH_THRESH_CLOSE||(c.pinchRaw&&d<PINCH_THRESH_OPEN);
}

// ═══════════════════════════════════════════════════════
// CONTROLS (mouse / keyboard fallback)
// ═══════════════════════════════════════════════════════
const keys={};
function setupControls(){
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    cursors[0].rawPos={x:e.clientX-r.left,y:e.clientY-r.top};
  });
  canvas.addEventListener('mousedown',()=>cursors[0].pinchRaw=true);
  canvas.addEventListener('mouseup',()=>cursors[0].pinchRaw=false);

  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    for(let i=0;i<Math.min(e.touches.length,2);i++){
      if(cursors[i]) cursors[i].rawPos={x:e.touches[i].clientX-r.left,y:e.touches[i].clientY-r.top};
    }
  },{passive:false});
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    for(let i=0;i<Math.min(e.touches.length,2);i++) if(cursors[i]) cursors[i].pinchRaw=true;
  },{passive:false});
  canvas.addEventListener('touchend',()=>cursors.forEach(c=>c.pinchRaw=false));

  document.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(e.code==='Space'){e.preventDefault();cursors[0].gunIdx=(cursors[0].gunIdx+1)%GUNS.length;}
    if(e.code==='KeyQ'&&cursors[1]) cursors[1].pinchRaw=true;
    if(e.code==='Enter'&&cursors[1]) cursors[1].pinchRaw=true;
    if(e.code==='KeyE'&&cursors[1]) cursors[1].gunIdx=(cursors[1].gunIdx+1)%GUNS.length;
  });
  document.addEventListener('keyup',e=>{
    keys[e.code]=false;
    if((e.code==='KeyQ'||e.code==='Enter')&&cursors[1]) cursors[1].pinchRaw=false;
  });
}

const KSPD=420;
function moveCursorByKeys(c,dt){
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA']) dx=-1;
  if(keys['ArrowRight']||keys['KeyD']) dx=1;
  if(keys['ArrowUp']||keys['KeyW']) dy=-1;
  if(keys['ArrowDown']||keys['KeyS']) dy=1;
  if(dx||dy){
    const len=Math.hypot(dx,dy);
    c.rawPos.x=Math.max(0,Math.min(W,c.rawPos.x+(dx/len)*KSPD*dt));
    c.rawPos.y=Math.max(0,Math.min(H,c.rawPos.y+(dy/len)*KSPD*dt));
  }
}

// ═══════════════════════════════════════════════════════
// WAVES
// ═══════════════════════════════════════════════════════
function spawnWave(w){
  const banner=document.getElementById('wave-banner');
  const isBoss=w%5===0;
  banner.textContent=isBoss?`⚠️ BOSS WAVE ${w}`:`— WAVE ${w} —`;
  banner.style.opacity='1'; setTimeout(()=>banner.style.opacity='0',2000);
  document.getElementById('wave-tag').textContent=`Wave ${w}`;

  const count=Math.min(4+w*2,32);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(!gameRunning)return;
      let ti;
      if(isBoss&&i===0) ti=4;
      else if(isBoss&&i<4) ti=3;
      else ti=Math.min(Math.floor(Math.random()*Math.min(4,1+Math.floor(w/2))),3);

      const t=ETYPES[ti];
      const margin=t.sz+10;
      enemies.push({
        x:margin+Math.random()*(W-margin*2),
        y:-t.sz*2-Math.random()*80,
        hp:t.hp*(1+w*.06), maxHp:t.hp*(1+w*.06),
        spd:t.spd*(1+w*.05)*(0.85+Math.random()*.3),
        sz:t.sz, col:t.col, pts:t.pts*(1+Math.floor(w/5)), em:t.em,
        boss:!!t.boss, name:t.n,
        wobT:Math.random()*Math.PI*2,
        hitFlash:0,
      });
    },i*380+Math.random()*160);
  }
}

// ═══════════════════════════════════════════════════════
// SHOOT
// ═══════════════════════════════════════════════════════
function shoot(c){
  const g=GUNS[c.gunIdx],now=performance.now();
  if(now-c.lastShot<g.rate)return;
  c.lastShot=now;
  c.muzzleFlash=6;
  const {x,y}=c.smoothPos;
  for(let i=0;i<g.blt;i++){
    const ang=-Math.PI/2+(Math.random()-.5)*g.spread*2;
    bullets.push({x,y,vx:Math.cos(ang)*g.spd,vy:Math.sin(ang)*g.spd,dmg:g.dmg,aoe:g.aoe,col:g.color,owner:c.owner,life:90,sz:g.aoe>0?9:4});
  }
  // Muzzle particles
  for(let i=0;i<12;i++){
    const a=-Math.PI/2+(Math.random()-.5)*.8;
    particles.push({x,y,vx:Math.cos(a)*(8+Math.random()*6),vy:Math.sin(a)*(8+Math.random()*6),life:14,maxLife:14,col:g.color,sz:3+Math.random()*2,type:'spark'});
  }
}

// ═══════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(ts){
  if(!gameRunning)return;
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts; frameCount++;
  update(dt); draw();
  requestAnimationFrame(loop);
}

function update(dt){
  // Cursor[1] keyboard movement (if no camera)
  if(cursors[1]&&!usingCamera) moveCursorByKeys(cursors[1],dt);

  // Smooth all cursors
  cursors.forEach(c=>{smoothCursor(c);if(c.muzzleFlash>0)c.muzzleFlash--;});

  // Shoot
  cursors.forEach(c=>{if(c.isPinching)shoot(c);});

  // Enemies
  enemies.forEach(e=>{
    e.y+=e.spd*dt;
    e.wobT+=dt*(e.boss?1:2);
    e.x+=Math.sin(e.wobT)*(e.boss?.8:1.2);
    e.x=Math.max(e.sz,Math.min(W-e.sz,e.x));
    if(e.hitFlash>0)e.hitFlash--;
  });

  // Bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;});

  // Collision
  for(const b of bullets){
    if(b.life<=0)continue;
    if(b.aoe>0){
      let triggered=false;
      for(const e of enemies){
        if(e.hp<=0)continue;
        if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz+b.sz){triggered=true;break;}
      }
      if(!triggered&&b.y>H-60)triggered=true;
      if(triggered){
        aoeBlast(b);
        b.life=0;
      }
    } else {
      for(const e of enemies){
        if(e.hp<=0)continue;
        if(Math.hypot(b.x-e.x,b.y-e.y)<e.sz+b.sz){
          e.hp-=b.dmg; e.hitFlash=5;
          hitFx(e.x,e.y,e.col);
          if(e.hp<=0){scores[b.owner]+=e.pts;killFx(e);}
          b.life=0; break;
        }
      }
    }
  }

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=.88; p.vy*=.88;
    p.life--;
    if(p.type==='smoke'){p.sz+=.3;p.vx*=.96;p.vy*=.96;}
  });

  enemies=enemies.filter(e=>e.hp>0&&e.y<H+150);
  bullets=bullets.filter(b=>b.life>0);
  particles=particles.filter(p=>p.life>0);

  waveTimer+=dt*1000;
  if(enemies.length===0&&waveTimer>2800){
    wave++;waveTimer=0;
    setTimeout(()=>spawnWave(wave),waveGap);
    waveGap=Math.max(600,waveGap-60);
  }

  document.getElementById('s1').textContent=scores[0];
  if(numPlayers===2)document.getElementById('s2').textContent=scores[1];
}

function aoeBlast(b){
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const d=Math.hypot(b.x-e.x,b.y-e.y);
    if(d<b.aoe){ e.hp-=b.dmg*(1-d/b.aoe); e.hitFlash=6; if(e.hp<=0){scores[b.owner]+=e.pts;killFx(e);} }
  });
  // Explosion ring
  for(let i=0;i<40;i++){
    const a=(i/40)*Math.PI*2,r=b.aoe*.7+Math.random()*30;
    particles.push({x:b.x+Math.cos(a)*r*.3,y:b.y+Math.sin(a)*r*.3,vx:Math.cos(a)*(4+Math.random()*5),vy:Math.sin(a)*(4+Math.random()*5),life:35+Math.random()*15,maxLife:50,col:b.col,sz:5+Math.random()*4,type:'spark'});
  }
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x:b.x,y:b.y,vx:Math.cos(a)*1.5,vy:Math.sin(a)*1.5,life:55,maxLife:55,col:'#fff8',sz:b.aoe*.25,type:'smoke'});
  }
}

function hitFx(x,y,col){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*(3+Math.random()*3),vy:Math.sin(a)*(3+Math.random()*3),life:16,maxLife:16,col,sz:3,type:'spark'});
  }
}

function killFx(e){
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*7;
    particles.push({x:e.x,y:e.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:50+Math.random()*20,maxLife:70,col:e.col,sz:6+Math.random()*4,type:'spark'});
  }
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x:e.x,y:e.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:70,maxLife:70,col:'#fff6',sz:e.sz*.4,type:'smoke'});
  }
}

// ═══════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════
function draw(){
  const env=ENVS[envIdx];
  drawBackground(env);
  drawParticlesBehind();
  enemies.forEach(e=>drawEnemy(e,env));
  drawBullets();
  drawParticlesFront();
  cursors.forEach(c=>drawCursor(c,env));
}

function drawBackground(env){
  // Cached sky gradient
  if(bgCacheEnv!==envIdx||!bgCache){
    const off=document.createElement('canvas');
    off.width=W; off.height=H;
    const oc=off.getContext('2d');
    const g=oc.createLinearGradient(0,0,0,H);
    g.addColorStop(0,env.sky[0]); g.addColorStop(1,env.sky[1]);
    oc.fillStyle=g; oc.fillRect(0,0,W,H);
    bgCache=off; bgCacheEnv=envIdx;
  }
  ctx.drawImage(bgCache,0,0);

  // Environment-specific BG
  if(envIdx===2){ // stars
    const t=frameCount*.002;
    stars.forEach(s=>{
      const tw=.5+s.b*.5+Math.sin(t+s.b*10)*.2;
      ctx.fillStyle=`rgba(255,255,255,${tw*s.b*.8})`;
      ctx.fillRect(s.x%W,s.y%H,s.b<.3?1:1.5,s.b<.3?1:1.5);
    });
  }
  if(envIdx===0){ // city skyline
    ctx.fillStyle='#0c0c14';
    for(let i=0;i<16;i++){
      const bw=W/16, bh=60+Math.sin(i*2.3+1)*80, bx=i*bw;
      ctx.fillRect(bx+1,H-55-bh,bw-2,bh);
      // Windows
      for(let wy=H-55-bh+8;wy<H-55-10;wy+=14){
        for(let wx=bx+4;wx<bx+bw-6;wx+=10){
          if(Math.sin(wx*wy*.03)>.2){ ctx.fillStyle='#ff92'; ctx.fillRect(wx,wy,6,8); ctx.fillStyle='#0c0c14'; }
        }
      }
    }
  }
  if(envIdx===1){ // volcano lava
    const t=frameCount*.02;
    const lg=ctx.createRadialGradient(W/2,H,20,W/2,H,360);
    lg.addColorStop(0,`rgba(255,140,0,${.35+Math.sin(t)*.08})`);
    lg.addColorStop(.5,`rgba(200,60,0,${.15+Math.sin(t+1)*.05})`);
    lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg; ctx.fillRect(0,H-300,W,300);
  }
  if(envIdx===3){ // feudal pagodas
    ctx.fillStyle='#1a1208cc';
    for(let i=0;i<5;i++){
      const tx=i*(W/4)+W*.05;
      for(let f=0;f<3;f++){
        const fw=80-f*20, fh=30, fy=H-55-fh-f*fh*1.8;
        ctx.fillRect(tx-fw/2,fy,fw,fh);
        ctx.fillStyle='#2a1f08cc';
        ctx.beginPath(); ctx.moveTo(tx-fw/2-10,fy); ctx.lineTo(tx+fw/2+10,fy); ctx.lineTo(tx,fy-20); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#1a1208cc';
      }
    }
  }
  if(envIdx===4){ // ocean waves
    const t=frameCount*.015;
    for(let w=0;w<4;w++){
      const wy=H-80+w*16, alpha=.08+w*.04;
      ctx.strokeStyle=`rgba(0,180,255,${alpha})`;
      ctx.lineWidth=2; ctx.beginPath();
      for(let x=0;x<=W;x+=6){
        const y=wy+Math.sin(x*.015+t+w)*(8-w*1.5)+Math.sin(x*.03+t*.7+w)*4;
        x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }

  // Ground
  ctx.fillStyle=env.ground; ctx.fillRect(0,H-55,W,55);
  // Ground edge highlight
  ctx.fillStyle=env.accentDim; ctx.fillRect(0,H-57,W,2);

  // Scan lines (subtle)
  ctx.fillStyle='#0003';
  for(let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);

  // Fog/vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.85);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'#00000088');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

function drawParticlesBehind(){
  particles.filter(p=>p.type==='smoke').forEach(p=>{
    const a=Math.max(0,p.life/p.maxLife)*.35;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.sz),0,Math.PI*2);
    ctx.fillStyle=p.col.replace(/[\d.]+\)$/,`${a})`)||`rgba(200,200,200,${a})`;
    ctx.fill();
  });
}

function drawParticlesFront(){
  particles.filter(p=>p.type==='spark').forEach(p=>{
    const a=Math.max(0,p.life/p.maxLife);
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.sz*a),0,Math.PI*2);
    ctx.fillStyle=p.col;
    ctx.globalAlpha=a;
    ctx.shadowBlur=8; ctx.shadowColor=p.col;
    ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=b.aoe>0?30:18; ctx.shadowColor=b.col;
    if(b.aoe>0){
      // Grenade: pulsing orb
      const pulse=1+Math.sin(frameCount*.3)*.15;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.sz*pulse,0,Math.PI*2);
      const rg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.sz*pulse);
      rg.addColorStop(0,'#fff'); rg.addColorStop(.4,b.col); rg.addColorStop(1,b.col+'44');
      ctx.fillStyle=rg; ctx.fill();
    } else {
      // Draw trail
      ctx.beginPath();
      ctx.moveTo(b.x-b.vx*3,b.y-b.vy*3);
      ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=b.col+'88'; ctx.lineWidth=b.sz*1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x,b.y,b.sz,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
    }
    ctx.shadowBlur=0; ctx.restore();
  });
}

function drawEnemy(e,env){
  ctx.save(); ctx.translate(e.x,e.y);

  if(e.boss){ ctx.shadowBlur=50; ctx.shadowColor=e.col; }
  else if(e.hitFlash>0){ ctx.shadowBlur=20; ctx.shadowColor='#fff'; }

  // Body
  ctx.beginPath(); ctx.arc(0,0,e.sz,0,Math.PI*2);
  const flashMix=e.hitFlash>0?'#fff':'';
  ctx.fillStyle=e.hitFlash>0?mixColor(e.col,'#fff',.5):e.col+'bb';
  ctx.fill();
  ctx.strokeStyle=e.col; ctx.lineWidth=e.boss?3:1.5; ctx.stroke();
  ctx.shadowBlur=0;

  // Emoji
  ctx.font=`${e.sz*.88}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(e.em,0,2);

  // HP bar
  const bw=e.sz*2.5, frac=Math.max(0,e.hp/e.maxHp);
  const barY=-e.sz-16;
  ctx.fillStyle='#111'; ctx.fillRect(-bw/2,barY,bw,7);
  const hcol=frac>.6?'#0f0':frac>.3?'#ff0':'#f00';
  ctx.fillStyle=hcol; ctx.fillRect(-bw/2,barY,bw*frac,7);
  ctx.strokeStyle='#fff2'; ctx.lineWidth=.5; ctx.strokeRect(-bw/2,barY,bw,7);

  if(e.boss){
    ctx.font='bold 11px Courier New'; ctx.fillStyle='#fffd'; ctx.textAlign='center';
    ctx.fillText(e.name,0,-e.sz-26);
  }
  ctx.restore();
}

function mixColor(hex,hex2,t){
  // simple mix for flash
  return hex; // keep it simple for perf
}

function drawCursor(c,env){
  const {x,y}=c.smoothPos;
  const gun=GUNS[c.gunIdx], col=c.color;
  const cs=24;

  // Motion trail
  if(c.trailPoints.length>1){
    ctx.beginPath();
    c.trailPoints.forEach((p,i)=>{
      const a=i/c.trailPoints.length;
      if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
    });
    ctx.strokeStyle=col+'33'; ctx.lineWidth=2; ctx.stroke();
  }

  ctx.save();
  ctx.shadowBlur=18; ctx.shadowColor=col;
  ctx.strokeStyle=col; ctx.lineWidth=2;

  // Cross-hair gaps
  ctx.beginPath(); ctx.moveTo(x-cs,y); ctx.lineTo(x-8,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+8,y); ctx.lineTo(x+cs,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-cs); ctx.lineTo(x,y-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y+8); ctx.lineTo(x,y+cs); ctx.stroke();

  // Center ring — pulses when shooting
  const rSize=c.isPinching?6:8;
  ctx.beginPath(); ctx.arc(x,y,rSize,0,Math.PI*2); ctx.stroke();

  // Corner ticks
  const tk=6;
  [[x-cs,y-cs],[x+cs,y-cs],[x-cs,y+cs],[x+cs,y+cs]].forEach(([cx,cy],i)=>{
    const sx=i<2?1:-1, sy=i%2===0?1:-1;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*tk,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy+sy*tk); ctx.stroke();
  });

  ctx.shadowBlur=0;

  // Muzzle flash
  if(c.muzzleFlash>0){
    const flAlpha=c.muzzleFlash/6;
    ctx.beginPath(); ctx.arc(x,y,28*flAlpha,0,Math.PI*2);
    ctx.fillStyle=col+(Math.floor(flAlpha*180).toString(16).padStart(2,'0'));
    ctx.fill();
  }

  // Pinch ring
  if(c.isPinching){
    ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2);
    ctx.strokeStyle='#fffa'; ctx.lineWidth=2.5; ctx.stroke();
  }

  ctx.restore();

  // Label
  ctx.font='bold 11px Courier New'; ctx.textAlign='center';
  ctx.fillStyle=col+'cc';
  ctx.fillText(`${c.label} · ${gun.emoji} ${gun.name}`,x,y-cs-12);
}
